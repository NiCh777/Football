<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Head Football Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #setup-menu { position: absolute; inset: 0; background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .menu-btn { padding: 20px; margin: 10px; font-size: 20px; cursor: pointer; border: none; border-radius: 10px; color: white; width: 250px; font-weight: bold; }
        #btn-p1 { background: #0052cc; } #btn-p2 { background: #cc0000; }
        canvas { background: #2d5a27; border: 5px solid #fff; border-radius: 5px; display: none; max-width: 95vw; }
        #score { font-size: 40px; margin-bottom: 10px; display: none; font-weight: bold; }
        .controls { position: fixed; bottom: 20px; display: none; gap: 20px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; font-size: 30px; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: #4CAF50;">ONLINE FOOTBALL</h1>
    <button class="menu-btn" id="btn-p1" onclick="selectRole('p1')">PLAYER 1 (ლურჯი)</button>
    <button class="menu-btn" id="btn-p2" onclick="selectRole('p2')">PLAYER 2 (წითელი)</button>
    <p>ერთი აირჩიეთ P1, მეორემ P2</p>
</div>

<div id="score">0 : 0</div>
<canvas id="game"></canvas>

<div class="controls" id="controls">
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="up">⬆️</button>
    <button class="btn" id="right">➡️</button>
</div>

<script>
    const config = {
        apiKey: "AIzaSyDSMrfnR1K19ScIiKov2uYSc_3Yz4DjlpA",
        authDomain: "football-79702.firebaseapp.com",
        projectId: "football-79702",
        databaseURL: "https://football-79702-default-rtdb.firebaseio.com/",
        storageBucket: "football-79702.firebasestorage.app",
        messagingSenderId: "611649746367",
        appId: "1:611649746367:web:641820dc87089377915d0a"
    };

    firebase.initializeApp(config);
    const db = firebase.database().ref('game_state');

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 400;

    let role = null;
    let p1 = { x: 100, y: 340, dy: 0, s: 0 };
    let p2 = { x: 650, y: 340, dy: 0, s: 0 };
    let ball = { x: 400, y: 200, dx: 0, dy: 0 };

    function selectRole(r) {
        role = r;
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('score').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        if(role === 'p1') db.set({ p1, p2, ball }); 
        requestAnimationFrame(update);
    }

    db.on('value', (s) => {
        const d = s.val(); if(!d) return;
        if(role === 'p1') {
            p2.x = d.p2.x; p2.y = d.p2.y;
        } else {
            p1.x = d.p1.x; p1.y = d.p1.y;
            ball.x = d.ball.x; ball.y = d.ball.y;
        }
        document.getElementById('score').innerText = `${d.p1.s} : ${d.p2.s}`;
        p1.s = d.p1.s; p2.s = d.p2.s;
    });

    let keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // მობილურის მართვა
    const ctrl = { l: false, r: false };
    document.getElementById('left').ontouchstart = () => ctrl.l = true;
    document.getElementById('left').ontouchend = () => ctrl.l = false;
    document.getElementById('right').ontouchstart = () => ctrl.r = true;
    document.getElementById('right').ontouchend = () => ctrl.r = false;
    document.getElementById('up').ontouchstart = () => {
        let me = role === 'p1' ? p1 : p2;
        if(me.y >= 340) me.dy = -12;
    };

    function update() {
        ctx.clearRect(0, 0, 800, 400);
        let me = role === 'p1' ? p1 : p2;

        if (keys['ArrowLeft'] || ctrl.l) me.x -= 5;
        if (keys['ArrowRight'] || ctrl.r) me.x += 5;
        if ((keys['ArrowUp'] || keys['Space']) && me.y >= 340) me.dy = -12;

        me.dy += 0.6; me.y += me.dy;
        if(me.y > 340) { me.y = 340; me.dy = 0; }

        if(role === 'p1') {
            ball.x += ball.dx; ball.y += ball.dy;
            ball.dy += 0.2; 
            if(ball.y > 385) { ball.y = 385; ball.dy *= -0.6; ball.dx *= 0.98; }
            if(ball.x < 0 || ball.x > 800) {
                if(ball.y > 250) { // გოლი
                    if(ball.x < 10) p2.s++; else p1.s++;
                    ball = { x: 400, y: 150, dx: 0, dy: 0 };
                }
                ball.dx *= -0.8;
            }
            // შეხება ფეხბურთელებთან
            [p1, p2].forEach(p => {
                if(ball.x > p.x && ball.x < p.x+50 && ball.y > p.y && ball.y < p.y+60) {
                    ball.dy = -8; ball.dx = (ball.x - (p.x+25)) * 0.3;
                }
            });
            db.update({ p1, ball });
        } else {
            db.update({ p2 });
        }

        ctx.fillStyle = "#0052cc"; ctx.fillRect(p1.x, p1.y, 50, 60);
        ctx.fillStyle = "#cc0000"; ctx.fillRect(p2.x, p2.y, 50, 60);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.strokeRect(0, 250, 10, 150); ctx.strokeRect(790, 250, 10, 150);

        requestAnimationFrame(update);
    }
</script>
</body>
</html>
