<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Head Football Online PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #setup-menu { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .menu-btn { padding: 20px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; color: white; width: 260px; font-weight: bold; transition: 0.3s; }
        #btn-p1 { background: #0052cc; } #btn-p2 { background: #cc0000; }
        .menu-btn:disabled { background: #333 !important; cursor: not-allowed; opacity: 0.5; }
        canvas { background: #1a472a; border: 4px solid #fff; border-radius: 5px; display: none; max-width: 95vw; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #score { font-size: 45px; margin-bottom: 10px; display: none; font-weight: bold; letter-spacing: 5px; }
        .controls { position: fixed; bottom: 25px; display: none; gap: 25px; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; font-size: 30px; outline: none; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: #00f2fe;">FOOTBALL ONLINE</h1>
    <button class="menu-btn" id="btn-p1" onclick="selectRole('p1')">PLAYER 1 (BLUE)</button>
    <button class="menu-btn" id="btn-p2" onclick="selectRole('p2')">PLAYER 2 (RED)</button>
    <p id="status-msg" style="color: #666; margin-top: 20px;">დაელოდე მოწინააღმდეგეს...</p>
</div>

<div id="score">0 : 0</div>
<canvas id="game"></canvas>

<div class="controls" id="controls">
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="up">⬆️</button>
    <button class="btn" id="right">➡️</button>
</div>

<script>
    const config = {
        apiKey: "AIzaSyDSMrfnR1K19ScIiKov2uYSc_3Yz4DjlpA",
        authDomain: "football-79702.firebaseapp.com",
        projectId: "football-79702",
        databaseURL: "https://football-79702-default-rtdb.firebaseio.com/",
        storageBucket: "football-79702.firebasestorage.app",
        messagingSenderId: "611649746367",
        appId: "1:611649746367:web:641820dc87089377915d0a"
    };

    firebase.initializeApp(config);
    const db = firebase.database().ref('game_state');
    const presenceRef = firebase.database().ref('presence');

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 400;

    let role = null;
    let p1 = { x: 100, y: 340, dy: 0, s: 0 };
    let p2 = { x: 650, y: 340, dy: 0, s: 0 };
    let ball = { x: 400, y: 200, dx: 3, dy: 3 };

    // როლების შემოწმება რეალურ დროში
    presenceRef.on('value', (snap) => {
        const data = snap.val() || {};
        const b1 = document.getElementById('btn-p1');
        const b2 = document.getElementById('btn-p2');

        if (data.p1 && role !== 'p1') { b1.disabled = true; b1.innerText = "P1 (Occupied)"; }
        else { b1.disabled = false; b1.innerText = "PLAYER 1 (BLUE)"; }

        if (data.p2 && role !== 'p2') { b2.disabled = true; b2.innerText = "P2 (Occupied)"; }
        else { b2.disabled = false; b2.innerText = "PLAYER 2 (RED)"; }
    });

    function selectRole(r) {
        role = r;
        presenceRef.child(r).set(true);
        presenceRef.child(r).onDisconnect().remove(); // თუ გაითიშა, როლი გათავისუფლდეს

        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('score').style.display = 'block';
        document.getElementById('controls').style.display = 'flex';
        
        if(role === 'p1') db.update({ p1, p2, ball });
        requestAnimationFrame(update);
    }

    db.on('value', (s) => {
        const d = s.val(); if(!d) return;
        if(role === 'p1') {
            p2.x = d.p2.x; p2.y = d.p2.y;
        } else {
            p1.x = d.p1.x; p1.y = d.p1.y;
            ball.x = d.ball.x; ball.y = d.ball.y;
        }
        document.getElementById('score').innerText = `${d.p1.s} : ${d.p2.s}`;
        p1.s = d.p1.s; p2.s = d.p2.s;
    });

    let keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    const ctrl = { l: false, r: false };
    document.getElementById('left').ontouchstart = (e) => { e.preventDefault(); ctrl.l = true; };
    document.getElementById('left').ontouchend = () => ctrl.l = false;
    document.getElementById('right').ontouchstart = (e) => { e.preventDefault(); ctrl.r = true; };
    document.getElementById('right').ontouchend = () => ctrl.r = false;
    document.getElementById('up').ontouchstart = (e) => {
        e.preventDefault();
        let me = role === 'p1' ? p1 : p2;
        if(me.y >= 340) me.dy = -13;
    };

    function update() {
        ctx.clearRect(0, 0, 800, 400);
        let me = role === 'p1' ? p1 : p2;

        if (keys['ArrowLeft'] || ctrl.l) me.x -= 6;
        if (keys['ArrowRight'] || ctrl.r) me.x += 6;
        if ((keys['ArrowUp'] || keys['Space']) && me.y >= 340) me.dy = -13;

        me.dy += 0.7; me.y += me.dy;
        if(me.y > 340) { me.y = 340; me.dy = 0; }
        if(me.x < 0) me.x = 0; if(me.x > 750) me.x = 750;

        if(role === 'p1') {
            ball.x += ball.dx; ball.y += ball.dy;
            ball.dy += 0.25; 

            if(ball.y > 385) { ball.y = 385; ball.dy *= -0.7; }
            if(ball.y < 0) { ball.y = 0; ball.dy *= -0.7; }

            // გოლების ლოგიკა (გასწორებული)
            if(ball.x < 0) {
                if(ball.y > 200) { p2.s++; resetBall(); } 
                else { ball.dx *= -1; ball.x = 5; }
            }
            if(ball.x > 800) {
                if(ball.y > 200) { p1.s++; resetBall(); } 
                else { ball.dx *= -1; ball.x = 795; }
            }

            function resetBall() {
                ball = { x: 400, y: 150, dx: (Math.random() > 0.5 ? 3 : -3), dy: 2 };
            }

            [p1, p2].forEach(p => {
                if(ball.x > p.x && ball.x < p.x+50 && ball.y > p.y && ball.y < p.y+60) {
                    ball.dy = -9;
                    ball.dx = (ball.x - (p.x+25)) * 0.4;
                }
            });
            db.update({ p1, ball, p2 });
        } else {
            db.update({ p2 });
        }

        // მოედანი
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.strokeRect(400, 0, 1, 400);
        
        ctx.fillStyle = "#0052cc"; ctx.fillRect(p1.x, p1.y, 50, 60);
        ctx.fillStyle = "#cc0000"; ctx.fillRect(p2.x, p2.y, 50, 60);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 12, 0, Math.PI*2); ctx.fill();
        
        // კარები
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillRect(0, 200, 10, 200);
        ctx.fillRect(790, 200, 10, 200);

        requestAnimationFrame(update);
    }
</script>
</body>
</html>
